<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grade 4/5 Absolute Value Lab</title>
  <style>
    :root{
      --cyan:#6de8ff;--blue:#5b93ff;--green:#59f0a5;--yellow:#ffd86a;--orange:#ffad5c;
      --red:#ff6b89;--purple:#ad84ff;--white:#eef5ff;--muted:#adc0ea;
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;width:100%;height:100%;overflow:hidden;
      font-family:Arial,Helvetica,sans-serif;color:var(--white);
      background:radial-gradient(circle at 18% 12%,#244191,#0b1f49 32%,#061024 70%,#02040c);
    }
    .stars,.grid,.scan{position:absolute;inset:0;pointer-events:none}
    .stars{
      background-image:radial-gradient(circle,rgba(255,255,255,.35) 1px,transparent 1px),
      radial-gradient(circle,rgba(109,232,255,.22) 1px,transparent 1px);
      background-size:72px 72px,112px 112px;opacity:.42;animation:drift 18s linear infinite;
    }
    .grid{
      background-image:linear-gradient(rgba(109,232,255,.075) 1px,transparent 1px),
      linear-gradient(90deg,rgba(109,232,255,.075) 1px,transparent 1px);
      background-size:58px 58px;
      transform:perspective(760px) rotateX(62deg) translateY(35vh) scale(1.45);
      transform-origin:bottom center;opacity:.35;animation:gridMove 5.2s linear infinite;
    }
    .scan{
      background:repeating-linear-gradient(to bottom,rgba(255,255,255,.03),rgba(255,255,255,.03) 1px,transparent 1px,transparent 6px);
      opacity:.15;
    }
    @keyframes drift{from{transform:translateY(0)}to{transform:translateY(120px)}}
    @keyframes gridMove{from{background-position:0 0}to{background-position:0 58px}}
    .app{position:relative;width:100vw;height:100vh;padding:18px 20px 24px}
    .topbar{position:relative;z-index:30;display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:10px}
    .brand{display:flex;align-items:center;gap:12px}
    .logo{
      width:44px;height:44px;border-radius:50%;
      background:radial-gradient(circle at 35% 35%,#fff,var(--cyan) 35%,var(--blue) 70%,#102555);
      box-shadow:0 0 28px rgba(109,232,255,.45)
    }
    .brand-title{font-size:21px;font-weight:900}
    .brand-sub{font-size:12px;color:var(--muted);margin-top:3px}
    .top-controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
    .pill{
      padding:10px 14px;border-radius:999px;background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);color:var(--muted);font-size:13px;font-weight:800;
      max-width:460px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis
    }
    button{
      border:0;border-radius:999px;padding:11px 18px;cursor:pointer;font-weight:900;color:#071126;
      background:linear-gradient(135deg,var(--cyan),var(--blue));
      box-shadow:0 10px 24px rgba(91,147,255,.25);transition:.15s
    }
    button:hover{transform:translateY(-1px);filter:brightness(1.08)}
    button.secondary{color:var(--white);background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);box-shadow:none}
    button.green{background:linear-gradient(135deg,var(--green),#32d28e);color:#06261a}
    button.yellow{background:linear-gradient(135deg,var(--yellow),#ffb93c);color:#2a1a00}
    button.red{background:linear-gradient(135deg,#ff96aa,var(--red));color:#30000b}
    .stage{
      position:relative;z-index:10;height:calc(100vh - 118px);border-radius:30px;overflow:hidden;
      border:1px solid rgba(255,255,255,.08);
      background:linear-gradient(135deg,rgba(12,25,58,.86),rgba(5,11,28,.86));
      box-shadow:0 30px 80px rgba(0,0,0,.38),inset 0 0 60px rgba(109,232,255,.04)
    }
    .scene{
      position:absolute;inset:0;padding:40px 42px 88px;
      display:grid;grid-template-columns:1.02fr .98fr;gap:28px;align-items:center;
      animation:sceneIn .38s ease both;
    }
    @keyframes sceneIn{from{opacity:0;transform:translateY(14px) scale(.985)}to{opacity:1;transform:translateY(0) scale(1)}}
    .panel{
      background:linear-gradient(135deg,rgba(19,36,84,.78),rgba(10,17,42,.72));
      border:1px solid rgba(109,232,255,.16);border-radius:28px;padding:30px;
      box-shadow:inset 0 0 35px rgba(109,232,255,.04)
    }
    .kicker{
      display:inline-block;padding:8px 14px;border-radius:999px;background:rgba(109,232,255,.1);
      border:1px solid rgba(109,232,255,.18);color:var(--cyan);text-transform:uppercase;
      letter-spacing:.1em;font-size:12px;font-weight:900;margin-bottom:16px
    }
    .title{
      font-size:clamp(34px,4.5vw,68px);line-height:.98;font-weight:900;margin:0 0 14px;
      letter-spacing:-.04em;text-shadow:0 0 30px rgba(109,232,255,.18)
    }
    .subtitle{font-size:clamp(18px,2vw,27px);line-height:1.35;color:var(--muted);margin:0 0 18px}
    .body-text{font-size:clamp(20px,2.05vw,30px);line-height:1.42;margin:0 0 16px;color:#edf5ff}
    .small{color:var(--muted);font-size:16px;line-height:1.5}
    .green-text{color:var(--green);font-weight:900}.yellow-text{color:var(--yellow);font-weight:900}
    .red-text{color:var(--red);font-weight:900}.cyan-text{color:var(--cyan);font-weight:900}
    .purple-text{color:var(--purple);font-weight:900}.orange-text{color:var(--orange);font-weight:900}
    .bullets{display:grid;gap:12px;margin-top:18px}
    .bullet{
      display:flex;gap:12px;align-items:flex-start;background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:14px 16px;
      font-size:20px;line-height:1.4
    }
    .icon{
      width:34px;height:34px;border-radius:12px;background:rgba(109,232,255,.12);color:var(--cyan);
      display:flex;align-items:center;justify-content:center;font-weight:900;flex:0 0 auto
    }
    .visual{min-height:460px;display:flex;align-items:center;justify-content:center;position:relative}
    .big-orb{
      width:min(32vw,360px);height:min(32vw,360px);border-radius:50%;
      background:conic-gradient(from 0deg,rgba(109,232,255,.12),rgba(173,132,255,.5),rgba(89,240,165,.15),rgba(255,216,106,.18),rgba(109,232,255,.12));
      box-shadow:0 0 90px rgba(109,232,255,.16),inset 0 0 45px rgba(0,0,0,.35);
      animation:spin 10s linear infinite;position:relative
    }
    .big-orb:before{
      content:"ABSOLUTE VALUE";position:absolute;inset:22%;border-radius:50%;
      display:flex;align-items:center;justify-content:center;text-align:center;
      background:rgba(3,8,24,.82);color:var(--cyan);
      font-size:clamp(15px,1.5vw,24px);font-weight:900;letter-spacing:.1em;padding:18px
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    .equation-card{
      width:100%;max-width:650px;padding:28px;border-radius:24px;background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.12);text-align:center;
      font-size:clamp(28px,3.7vw,52px);font-weight:900;line-height:1.34;
      white-space:pre-line;box-shadow:0 0 34px rgba(109,232,255,.06)
    }
    .equation-card.left{text-align:left;font-size:clamp(23px,2.8vw,39px)}
    .map-grid{display:grid;grid-template-columns:repeat(2,minmax(180px,1fr));gap:16px;margin-top:20px}
    .map-card{
      min-height:112px;border-radius:20px;padding:18px;background:rgba(255,255,255,.06);
      border:1px solid rgba(109,232,255,.12);position:relative;overflow:hidden
    }
    .map-card:after{
      content:"";position:absolute;left:-60%;top:0;width:45%;height:100%;
      background:linear-gradient(90deg,transparent,rgba(109,232,255,.15),transparent);
      animation:shine 4.5s ease-in-out infinite
    }
    @keyframes shine{0%{left:-60%}55%,100%{left:130%}}
    .map-card h4{margin:0 0 8px;color:var(--cyan);font-size:22px}
    .map-card p{margin:0;color:var(--muted);font-size:15px;line-height:1.4}
    .number-line-box,.lab-box{
      width:100%;max-width:830px;padding:26px;border-radius:28px;background:rgba(255,255,255,.07);
      border:1px solid rgba(109,232,255,.16);box-shadow:inset 0 0 30px rgba(109,232,255,.04)
    }
    .axis-wrap{position:relative;height:128px;margin-top:18px}
    .axis{position:absolute;left:18px;right:18px;top:62px;height:4px;border-radius:999px;background:linear-gradient(90deg,var(--red),var(--cyan),var(--green));box-shadow:0 0 18px rgba(109,232,255,.25)}
    .tick{position:absolute;top:48px;width:2px;height:28px;background:rgba(255,255,255,.36);transform:translateX(-50%)}
    .tick span{position:absolute;top:34px;left:50%;transform:translateX(-50%);font-size:13px;font-weight:800;color:#e7efff}
    .point{position:absolute;top:62px;width:30px;height:30px;border-radius:50%;transform:translate(-50%,-50%);z-index:5;box-shadow:0 0 16px currentColor}
    .p-yellow{background:var(--yellow);color:var(--yellow)}.p-green{background:var(--green);color:var(--green)}.p-purple{background:var(--purple);color:var(--purple)}
    .segment{position:absolute;top:58px;height:8px;border-radius:999px;background:rgba(109,232,255,.55);z-index:2}
    .point-label{position:absolute;top:12px;transform:translateX(-50%);font-size:14px;font-weight:900;color:var(--white);z-index:7}
    .bar-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}
    .stat-box{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.10);border-radius:18px;padding:14px}
    .stat-box h4{margin:0 0 8px;color:var(--cyan);font-size:16px}
    .stat-value{font-size:25px;font-weight:900;color:var(--white);word-break:break-word}
    .slider-wrap{margin-top:15px}
    .slider-wrap label{display:flex;justify-content:space-between;margin-bottom:8px;color:var(--muted);font-size:14px;font-weight:800}
    .slider-wrap input[type=range]{width:100%;accent-color:var(--cyan)}
    .formula-panel{
      margin-top:16px;padding:16px;border-radius:18px;background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);font-size:22px;font-weight:900;text-align:center
    }
    .lab-controls{display:flex;gap:12px;margin-top:16px;flex-wrap:wrap}
    .quiz-card{
      width:100%;max-width:830px;padding:28px;border-radius:28px;
      background:linear-gradient(135deg,rgba(109,232,255,.09),rgba(173,132,255,.08));
      border:1px solid rgba(109,232,255,.18)
    }
    .quiz-question{font-size:clamp(24px,2.6vw,37px);font-weight:900;line-height:1.25;margin:0 0 20px}
    .choices{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .choice{
      border-radius:18px;padding:18px 20px;font-size:21px;font-weight:900;color:var(--white);text-align:left;
      background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);box-shadow:none
    }
    .choice.correct{background:rgba(89,240,165,.18);border-color:rgba(89,240,165,.55);color:var(--green)}
    .choice.wrong{background:rgba(255,107,137,.18);border-color:rgba(255,107,137,.55);color:var(--red)}
    .feedback{
      margin-top:16px;border-radius:18px;padding:16px 18px;font-size:20px;line-height:1.35;font-weight:800;display:none
    }
    .feedback.show{display:block}.feedback.good{background:rgba(89,240,165,.14);border:1px solid rgba(89,240,165,.4);color:#dfffee}
    .feedback.bad{background:rgba(255,107,137,.14);border:1px solid rgba(255,107,137,.4);color:#ffe4ea}
    .answer-pop{
      position:absolute;right:42px;bottom:96px;z-index:30;padding:18px 24px;border-radius:24px;
      font-size:42px;font-weight:900;background:rgba(0,0,0,.52);border:1px solid rgba(255,255,255,.16);
      box-shadow:0 0 45px rgba(109,232,255,.12);display:none
    }
    .answer-pop.show{display:block}.answer-pop.good{color:var(--green)}.answer-pop.bad{color:var(--red)}
    .footer{
      position:absolute;left:0;right:0;bottom:0;z-index:18;display:flex;justify-content:center;align-items:center;
      gap:10px;padding:16px 20px 18px;background:linear-gradient(180deg,rgba(3,7,18,0),rgba(3,7,18,.5))
    }
    .scene-count{min-width:96px;text-align:center;color:var(--muted);font-size:13px;font-weight:800}
    .teacher-panel{
      position:absolute;right:22px;top:70px;width:390px;max-width:calc(100vw - 44px);z-index:70;
      background:rgba(8,15,37,.96);border:1px solid rgba(109,232,255,.18);border-radius:22px;padding:18px;
      box-shadow:0 20px 55px rgba(0,0,0,.38);display:none
    }
    .teacher-panel.show{display:block}.teacher-panel h3{margin:0 0 12px;color:var(--cyan);font-size:20px}
    .teacher-panel label{display:block;margin:12px 0 6px;font-size:13px;color:var(--muted);font-weight:800}
    .teacher-panel select{
      width:100%;padding:10px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.05);color:var(--white);outline:none;font-size:14px
    }
    .teacher-panel .row{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}.teacher-panel .row button{flex:1;min-width:105px}
    .teacher-note{margin-top:12px;color:var(--muted);font-size:12px;line-height:1.45}
    @media(max-width:980px){
      .scene{grid-template-columns:1fr;overflow:auto;padding:28px 20px 88px}.visual{min-height:260px}
      .choices{grid-template-columns:1fr}.map-grid{grid-template-columns:1fr}.bar-row{grid-template-columns:1fr}
      .topbar{flex-direction:column;align-items:stretch}.top-controls{justify-content:flex-start}
    }
  </style>
</head>
<body>
  <div class="stars"></div><div class="grid"></div><div class="scan"></div>
  <div class="app">
    <div class="topbar">
      <div class="brand"><div class="logo"></div><div><div class="brand-title">Grade 4/5 Absolute Value Lab</div><div class="brand-sub">Definition · Number Line · Opposites · Distance</div></div></div>
      <div class="top-controls"><div class="pill" id="sceneNamePill">Scene</div><button class="secondary" type="button" onclick="window.toggleTeacherPanel()">Teacher Panel</button><button class="secondary" type="button" onclick="window.toggleFullscreen()">Fullscreen</button></div>
    </div>
    <div class="teacher-panel" id="teacherPanel">
      <h3>Teacher Panel</h3>
      <label>Jump to Scene</label><select id="sceneSelect"></select>
      <div class="row"><button type="button" onclick="window.jumpScene()">Go</button><button class="secondary" type="button" onclick="window.prevScene()">Back</button><button class="secondary" type="button" onclick="window.nextScene()">Next</button></div>
      <div class="row"><button class="secondary" type="button" onclick="window.resetCurrentInteraction()">Reset Interaction</button></div>
      <div class="teacher-note">Keyboard: → next, ← back, F fullscreen, T teacher panel. Final page sends students to Google Classroom.</div>
    </div>
    <div class="stage"><div id="sceneContainer"></div><div class="answer-pop" id="answerPop"></div><div class="footer"><button class="secondary" type="button" onclick="window.prevScene()">← Back</button><div class="scene-count" id="sceneCount">1 / 1</div><button type="button" onclick="window.nextScene()">Next →</button></div></div>
  </div>
<script>
(function(){
'use strict';

const scenes=[
{name:'Cover',kind:'content',kicker:'Interactive Lesson',title:'Absolute Value Lab',subtitle:'Grade 4/5 version: simpler, visual, and number-line based.',body:'Today we learn that absolute value means distance from 0. We will use number lines, sliders, and quick checks.',bullets:['What is absolute value?','Distance from 0','Opposite numbers','Compare absolute values','Distance between two numbers'],visual:'cover'},
{name:'Roadmap',kind:'content',kicker:'Lesson Map',title:'What We Will Learn',subtitle:'Absolute value is a distance idea.',body:'Even when a number is negative, its distance from 0 is positive. That is the main idea.',visual:'map'},
{name:'Definition',kind:'content',kicker:'Definition',title:'What Is Absolute Value?',subtitle:'Absolute value means distance from 0.',body:'The absolute value of a number is how far the number is from 0 on the number line.',equation:'|5| = 5\n|-5| = 5\n|0| = 0',bullets:['Distance is never negative','Positive numbers keep the same value','Negative numbers become positive distance'],visual:'equation'},
{name:'Number Line Intro',kind:'content',kicker:'Number Line',title:'Distance From 0',subtitle:'Look at how far a point is from 0.',body:'A number can be on the left side or the right side of 0. Absolute value only asks: how far away is it?',bullets:['5 is 5 units from 0','-5 is also 5 units from 0','So |5| and |-5| are both 5'],visual:'simpleLine'},
{name:'Absolute Value Slider',kind:'absLab',kicker:'Interactive Lab',title:'Absolute Value Slider',subtitle:'Move the point and watch the distance from 0.',body:'This is the main interactive page. Ask students: Is the point left or right of 0? What is its distance from 0?'},
{name:'Mini Check 1',kind:'quiz',kicker:'Mini Check',title:'Absolute Value',question:'What is |-7|?',choices:['-7','0','7','14'],correct:2,explanation:'|-7| is the distance from -7 to 0. That distance is 7.'},
{name:'Positive and Negative Same Distance',kind:'content',kicker:'Core Idea',title:'Two Numbers Can Have the Same Absolute Value',subtitle:'Opposite numbers are the same distance from 0.',body:'For example, 6 and -6 are on opposite sides of 0, but both are 6 units away from 0.',equation:'|6| = 6\n|-6| = 6\nSo |6| = |-6|',bullets:['Opposite numbers have the same distance from 0','One is left of 0, one is right of 0','Their absolute values are equal'],visual:'oppositeLine'},
{name:'Opposite Numbers Lab',kind:'oppositeLab',kicker:'Interactive Lab',title:'Opposite Numbers Lab',subtitle:'Choose a number and see its opposite.',body:'This lab shows two points that are the same distance from 0.'},
{name:'Mini Check 2',kind:'quiz',kicker:'Mini Check',title:'Opposite Numbers',question:'Which number has the same absolute value as -9?',choices:['-18','-1','0','9'],correct:3,explanation:'-9 and 9 are both 9 units from 0, so they have the same absolute value.'},
{name:'Absolute Value Is Not Always the Number',kind:'content',kicker:'Common Mistake',title:'Absolute Value Is a Distance',subtitle:'It is not the same as the original number when the original number is negative.',body:'A negative number has a positive absolute value because distance cannot be negative.',equation:'|-8| = 8\nnot -8',bullets:['Do not copy the negative sign into the answer','Ask: how far from 0?','Distance is positive or zero'],visual:'equation'},
{name:'Mini Check 3',kind:'quiz',kicker:'Mini Check',title:'Distance From 0',question:'Which statement is true?',choices:['|-4| = -4','|-4| = 4','|4| = -4','|0| = 1'],correct:1,explanation:'|-4| = 4 because -4 is 4 units from 0.'},
{name:'Compare Absolute Values',kind:'content',kicker:'Compare',title:'Compare Absolute Values',subtitle:'Compare distances from 0.',body:'A number farther from 0 has a larger absolute value. For example, -10 is farther from 0 than 3, so |-10| > |3|.',equation:'|-10| = 10\n|3| = 3\n10 > 3',bullets:['First find each distance from 0','Then compare the distances','The number farther from 0 has the bigger absolute value'],visual:'compareLine'},
{name:'Compare Lab',kind:'compareLab',kicker:'Interactive Lab',title:'Compare Absolute Values',subtitle:'Move two points and compare their distances from 0.',body:'This helps students see which point is farther from 0.'},
{name:'Mini Check 4',kind:'quiz',kicker:'Mini Check',title:'Compare Absolute Values',question:'Which is greater?',choices:['|-12|','|8|','They are equal','Cannot be determined'],correct:0,explanation:'|-12| = 12 and |8| = 8. Since 12 > 8, |-12| is greater.'},
{name:'Absolute Value in Stories',kind:'content',kicker:'Real World',title:'Absolute Value in Stories',subtitle:'Absolute value can describe distance, temperature change, or height from sea level.',body:'If a diver is 10 feet below sea level, we can say the diver is 10 feet from sea level. The position is -10, but the distance is 10.',equation:'position = -10 feet\ndistance from sea level = |-10| = 10 feet',bullets:['Position can be negative','Distance is positive','Absolute value helps turn position into distance'],visual:'equation'},
{name:'Mini Check 5',kind:'quiz',kicker:'Mini Check',title:'Real-World Absolute Value',question:'A submarine is at -15 feet. How far is it from sea level?',choices:['-15 feet','0 feet','15 feet','30 feet'],correct:2,explanation:'The submarine is 15 feet from sea level. |-15| = 15.'},
{name:'Distance Between Two Numbers',kind:'content',kicker:'Extension',title:'Distance Between Two Numbers',subtitle:'For Grade 5 extension: distance can be between two points, not just from 0.',body:'The distance between -3 and 5 is 8 units. You can count on the number line or use absolute value.',equation:'distance between -3 and 5\n= |5 - (-3)|\n= |8| = 8',bullets:['Start with number-line counting','Then show the formula as an extension','Distance is always positive'],visual:'distanceLine'},
{name:'Two-Point Distance Lab',kind:'distanceLab',kicker:'Interactive Lab',title:'Two-Point Distance Lab',subtitle:'Move two points and watch the distance between them.',body:'This is a good extension for stronger Grade 5 students.'},
{name:'Mini Check 6',kind:'quiz',kicker:'Mini Check',title:'Two-Point Distance',question:'What is the distance between -4 and 6?',choices:['2','6','10','-10'],correct:2,explanation:'From -4 to 6 is 10 units. Distance = |6 - (-4)| = 10.'},
{name:'Quick Recap',kind:'content',kicker:'Recap',title:'Remember These Ideas',subtitle:'Absolute value is simple if you think about distance.',body:'Absolute value asks how far a number is from 0. Opposite numbers have the same absolute value. Distance cannot be negative.',bullets:['|7| = 7','|-7| = 7','|0| = 0','Opposites have equal absolute value','Farther from 0 means larger absolute value'],visual:'map'},
{name:'Google Classroom',kind:'content',kicker:'Class Activity',title:'Go to Google Classroom',subtitle:'Open your Week form there.',body:'Now go to Google Classroom and open the assigned Google Form. Complete the questions carefully.',bullets:['Do not use a link from this page','Open Google Classroom','Find the correct Week form','Complete the Google Form'],visual:'classroom'},
{name:'Closing',kind:'content',kicker:'End',title:'Lesson Complete',subtitle:'Start the Google Form activity now.',body:'If students need a quick reminder, use the Teacher Panel to jump back to Absolute Value Slider, Opposite Numbers Lab, Compare Lab, or Two-Point Distance Lab.',bullets:['Absolute Value Slider for the definition','Opposite Numbers Lab for same distance','Compare Lab for farther from 0','Distance Lab for extension'],visual:'cover'}
];

let current=0;
const sceneContainer=document.getElementById('sceneContainer');
const sceneCount=document.getElementById('sceneCount');
const sceneNamePill=document.getElementById('sceneNamePill');
const sceneSelect=document.getElementById('sceneSelect');
const teacherPanel=document.getElementById('teacherPanel');
const answerPop=document.getElementById('answerPop');

function safe(str){
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}
function formatNum(n){
  const x=Number(n);
  return Number.isInteger(x)?String(x):x.toFixed(2).replace(/\.00$/,'');
}
function pct(v,min,max){return ((Number(v)-min)/(max-min))*86+7}
function axisHTML(config){
  const min=config.min,max=config.max,step=config.step||1;
  const p=v=>pct(v,min,max);
  let ticks='';
  for(let n=min;n<=max;n+=step){
    ticks+='<div class="tick" style="left:'+p(n)+'%"><span>'+n+'</span></div>';
  }
  let seg='';
  if(config.segment&&config.points&&config.points.length>=2){
    const a=p(config.points[0][0]),b=p(config.points[1][0]);
    seg='<div class="segment" style="left:'+Math.min(a,b)+'%;width:'+Math.abs(b-a)+'%"></div>';
  }
  let pts='';
  (config.points||[]).forEach((pt,i)=>{
    const cls=i===0?'p-yellow':i===1?'p-green':'p-purple';
    pts+='<div class="point '+cls+'" style="left:'+p(pt[0])+'%"></div><div class="point-label" style="left:'+p(pt[0])+'%">'+safe(pt[1])+'</div>';
  });
  return '<div class="axis-wrap"><div class="axis"></div>'+seg+ticks+pts+'</div>';
}
function renderContent(s){
  let left='<div class="panel"><div class="kicker">'+safe(s.kicker)+'</div><h1 class="title">'+safe(s.title)+'</h1>';
  if(s.subtitle)left+='<p class="subtitle">'+safe(s.subtitle)+'</p>';
  if(s.body)left+='<p class="body-text">'+safe(s.body)+'</p>';
  if(s.bullets)left+='<div class="bullets">'+s.bullets.map(b=>'<div class="bullet"><div class="icon">•</div><div>'+safe(b)+'</div></div>').join('')+'</div>';
  left+='</div>';
  return '<div class="scene"><div>'+left+'</div><div>'+renderVisual(s)+'</div></div>';
}
function renderQuiz(s){
  const choices=s.choices.map((c,i)=>'<button type="button" class="choice" onclick="window.checkAnswer('+i+')">'+String.fromCharCode(65+i)+') '+safe(c)+'</button>').join('');
  return '<div class="scene"><div><div class="panel"><div class="kicker">'+safe(s.kicker)+'</div><h1 class="title">'+safe(s.title)+'</h1><p class="subtitle">Click an answer to check immediately.</p><div class="bullets"><div class="bullet"><div class="icon">✓</div><div>If correct, the screen shows <span class="green-text">Correct!</span></div></div><div class="bullet"><div class="icon">×</div><div>If wrong, the screen shows <span class="red-text">Try Again</span></div></div></div></div></div><div class="visual"><div class="quiz-card"><p class="quiz-question">'+safe(s.question)+'</p><div class="choices">'+choices+'</div><div id="feedback" class="feedback"></div></div></div></div>';
}
function renderAbsLab(s){
  return '<div class="scene"><div><div class="panel"><div class="kicker">'+safe(s.kicker)+'</div><h1 class="title">'+safe(s.title)+'</h1><p class="subtitle">'+safe(s.subtitle)+'</p><p class="body-text">'+safe(s.body)+'</p><div class="bullets"><div class="bullet"><div class="icon">0</div><div>Zero is the starting point.</div></div><div class="bullet"><div class="icon">↔</div><div>Absolute value is distance from zero.</div></div><div class="bullet"><div class="icon">+</div><div>Distance is positive or zero.</div></div></div></div></div><div class="visual"><div class="lab-box"><div class="body-text" style="margin-top:0">Absolute Value Slider</div><div class="bar-row"><div class="stat-box"><h4>Point x</h4><div class="stat-value" id="absXDisplay">-6</div></div><div class="stat-box"><h4>Absolute Value</h4><div class="stat-value" id="absValueDisplay">6</div></div></div><div class="slider-wrap"><label><span>Move x</span><span id="absSliderValue">-6</span></label><input id="absSlider" type="range" min="-12" max="12" step="1" value="-6" oninput="window.updateAbsLab()"></div><div id="absAxis"></div><div class="formula-panel" id="absFormula">|-6| = 6</div></div></div></div>';
}
function renderOppositeLab(s){
  return '<div class="scene"><div><div class="panel"><div class="kicker">'+safe(s.kicker)+'</div><h1 class="title">'+safe(s.title)+'</h1><p class="subtitle">'+safe(s.subtitle)+'</p><p class="body-text">'+safe(s.body)+'</p></div></div><div class="visual"><div class="lab-box"><div class="body-text" style="margin-top:0">Opposite Numbers</div><div class="bar-row"><div class="stat-box"><h4>Number</h4><div class="stat-value" id="oppValueDisplay">7</div></div><div class="stat-box"><h4>Opposite</h4><div class="stat-value" id="oppOppDisplay">-7</div></div></div><div class="slider-wrap"><label><span>Choose distance from 0</span><span id="oppSliderValue">7</span></label><input id="oppSlider" type="range" min="1" max="12" step="1" value="7" oninput="window.updateOppositeLab()"></div><div id="oppAxis"></div><div class="formula-panel" id="oppFormula">|7| = 7 and |-7| = 7</div></div></div></div>';
}
function renderCompareLab(s){
  return '<div class="scene"><div><div class="panel"><div class="kicker">'+safe(s.kicker)+'</div><h1 class="title">'+safe(s.title)+'</h1><p class="subtitle">'+safe(s.subtitle)+'</p><p class="body-text">'+safe(s.body)+'</p></div></div><div class="visual"><div class="lab-box"><div class="body-text" style="margin-top:0">Compare Distances From 0</div><div class="bar-row"><div class="stat-box"><h4>Point a</h4><div class="stat-value" id="compADisplay">-8</div></div><div class="stat-box"><h4>Point b</h4><div class="stat-value" id="compBDisplay">5</div></div></div><div class="slider-wrap"><label><span>Point a</span><span id="compAValue">-8</span></label><input id="compA" type="range" min="-12" max="12" step="1" value="-8" oninput="window.updateCompareLab()"></div><div class="slider-wrap"><label><span>Point b</span><span id="compBValue">5</span></label><input id="compB" type="range" min="-12" max="12" step="1" value="5" oninput="window.updateCompareLab()"></div><div id="compAxis"></div><div class="formula-panel" id="compFormula">|-8| = 8 and |5| = 5, so |-8| is greater.</div></div></div></div>';
}
function renderDistanceLab(s){
  return '<div class="scene"><div><div class="panel"><div class="kicker">'+safe(s.kicker)+'</div><h1 class="title">'+safe(s.title)+'</h1><p class="subtitle">'+safe(s.subtitle)+'</p><p class="body-text">'+safe(s.body)+'</p></div></div><div class="visual"><div class="lab-box"><div class="body-text" style="margin-top:0">Two-Point Distance</div><div class="bar-row"><div class="stat-box"><h4>Point a</h4><div class="stat-value" id="distADisplay">-3</div></div><div class="stat-box"><h4>Point b</h4><div class="stat-value" id="distBDisplay">5</div></div></div><div class="bar-row"><div class="stat-box"><h4>Distance</h4><div class="stat-value" id="distDisplay">8</div></div><div class="stat-box"><h4>Formula</h4><div class="stat-value" id="distFormulaSmall">|5 - (-3)|</div></div></div><div class="slider-wrap"><label><span>Point a</span><span id="distAValue">-3</span></label><input id="distA" type="range" min="-12" max="12" step="1" value="-3" oninput="window.updateDistanceLab()"></div><div class="slider-wrap"><label><span>Point b</span><span id="distBValue">5</span></label><input id="distB" type="range" min="-12" max="12" step="1" value="5" oninput="window.updateDistanceLab()"></div><div id="distAxis"></div><div class="formula-panel" id="distFormula">Distance = |5 - (-3)| = 8</div></div></div></div>';
}
function renderVisual(s){
  if(s.visual==='cover')return '<div class="visual"><div class="big-orb"></div></div>';
  if(s.visual==='map')return '<div class="visual"><div class="panel" style="width:100%;max-width:700px"><div class="map-grid"><div class="map-card"><h4>Definition</h4><p>Absolute value is distance from 0.</p></div><div class="map-card"><h4>Number Line</h4><p>See distance visually.</p></div><div class="map-card"><h4>Opposites</h4><p>Same distance, different sides.</p></div><div class="map-card"><h4>Compare</h4><p>Farther from 0 means larger absolute value.</p></div></div></div></div>';
  if(s.visual==='equation')return '<div class="visual"><div class="equation-card left">'+safe(s.equation)+'</div></div>';
  if(s.visual==='simpleLine')return '<div class="visual"><div class="number-line-box"><div class="body-text" style="margin-bottom:0">Distance From 0</div>'+axisHTML({points:[[0,'0'],[5,'5']],min:-10,max:10,step:2,segment:true})+'<div class="small">5 is 5 units from 0.</div></div></div>';
  if(s.visual==='oppositeLine')return '<div class="visual"><div class="number-line-box"><div class="body-text" style="margin-bottom:0">Opposite Numbers</div>'+axisHTML({points:[[-6,'-6'],[0,'0'],[6,'6']],min:-10,max:10,step:2,segment:true})+'<div class="small">-6 and 6 are both 6 units from 0.</div></div></div>';
  if(s.visual==='compareLine')return '<div class="visual"><div class="number-line-box"><div class="body-text" style="margin-bottom:0">Compare Distance</div>'+axisHTML({points:[[-10,'-10'],[0,'0'],[3,'3']],min:-12,max:12,step:2,segment:true})+'<div class="small">-10 is farther from 0 than 3.</div></div></div>';
  if(s.visual==='distanceLine')return '<div class="visual"><div class="number-line-box"><div class="body-text" style="margin-bottom:0">Distance Between Two Points</div>'+axisHTML({points:[[-3,'-3'],[5,'5']],min:-10,max:10,step:2,segment:true})+'<div class="small">From -3 to 5 is 8 units.</div></div></div>';
  if(s.visual==='classroom')return '<div class="visual"><div class="number-line-box"><div class="body-text" style="margin-top:0">Google Classroom</div><div class="equation-card" style="font-size:36px">Open Classroom<br>Find Week Form<br>Start your Google Form</div></div></div>';
  return '<div class="visual"><div class="big-orb"></div></div>';
}
function renderScene(i){
  current=Math.max(0,Math.min(scenes.length-1,i));
  const s=scenes[current];
  if(s.kind==='quiz')sceneContainer.innerHTML=renderQuiz(s);
  else if(s.kind==='absLab')sceneContainer.innerHTML=renderAbsLab(s);
  else if(s.kind==='oppositeLab')sceneContainer.innerHTML=renderOppositeLab(s);
  else if(s.kind==='compareLab')sceneContainer.innerHTML=renderCompareLab(s);
  else if(s.kind==='distanceLab')sceneContainer.innerHTML=renderDistanceLab(s);
  else sceneContainer.innerHTML=renderContent(s);
  sceneCount.textContent=(current+1)+' / '+scenes.length;
  sceneNamePill.textContent=(current+1)+'. '+s.name;
  sceneSelect.value=String(current);
  answerPop.className='answer-pop';
  updateAllLabs();
}
function nextScene(){renderScene(current+1)}
function prevScene(){renderScene(current-1)}
function jumpScene(){renderScene(Number(sceneSelect.value))}
function toggleTeacherPanel(){teacherPanel.classList.toggle('show')}
function toggleFullscreen(){if(!document.fullscreenElement)document.documentElement.requestFullscreen();else document.exitFullscreen()}
function checkAnswer(idx){
  const s=scenes[current];if(!s||s.kind!=='quiz')return;
  const buttons=[...document.querySelectorAll('.choice')];
  buttons.forEach((b,i)=>{b.classList.remove('correct','wrong');if(i===s.correct)b.classList.add('correct')});
  const fb=document.getElementById('feedback');
  if(idx===s.correct){fb.className='feedback good show';fb.innerHTML='<strong>Correct!</strong><br>'+safe(s.explanation);showPop('Correct!','good')}
  else{buttons[idx].classList.add('wrong');fb.className='feedback bad show';fb.innerHTML='<strong>Try Again.</strong><br>'+safe(s.explanation);showPop('Try Again','bad')}
}
function showPop(text,type){answerPop.textContent=text;answerPop.className='answer-pop '+type+' show';setTimeout(()=>answerPop.className='answer-pop',1400)}
function resetCurrentInteraction(){
  const kind=scenes[current].kind;
  if(kind==='quiz'){const fb=document.getElementById('feedback');if(fb)fb.className='feedback';document.querySelectorAll('.choice').forEach(b=>b.classList.remove('correct','wrong'));answerPop.className='answer-pop'}
  if(kind==='absLab'){document.getElementById('absSlider').value=-6;updateAbsLab()}
  if(kind==='oppositeLab'){document.getElementById('oppSlider').value=7;updateOppositeLab()}
  if(kind==='compareLab'){document.getElementById('compA').value=-8;document.getElementById('compB').value=5;updateCompareLab()}
  if(kind==='distanceLab'){document.getElementById('distA').value=-3;document.getElementById('distB').value=5;updateDistanceLab()}
}
function updateAbsLab(){
  const el=document.getElementById('absSlider');if(!el)return;
  const x=Number(el.value),v=Math.abs(x);
  document.getElementById('absXDisplay').textContent=x;
  document.getElementById('absValueDisplay').textContent=v;
  document.getElementById('absSliderValue').textContent=x;
  document.getElementById('absAxis').innerHTML=axisHTML({points:[[0,'0'],[x,'x='+x]],min:-12,max:12,step:2,segment:true});
  document.getElementById('absFormula').textContent='|'+x+'| = '+v+' because '+x+' is '+v+' units from 0.';
}
function updateOppositeLab(){
  const el=document.getElementById('oppSlider');if(!el)return;
  const d=Number(el.value);
  document.getElementById('oppValueDisplay').textContent=d;
  document.getElementById('oppOppDisplay').textContent=-d;
  document.getElementById('oppSliderValue').textContent=d;
  document.getElementById('oppAxis').innerHTML=axisHTML({points:[[-d,'-'+d],[0,'0'],[d,String(d)]],min:-12,max:12,step:2,segment:true});
  document.getElementById('oppFormula').textContent='|'+d+'| = '+d+' and |-'+d+'| = '+d+'.';
}
function updateCompareLab(){
  const aEl=document.getElementById('compA'),bEl=document.getElementById('compB');if(!aEl||!bEl)return;
  const a=Number(aEl.value),b=Number(bEl.value),av=Math.abs(a),bv=Math.abs(b);
  document.getElementById('compADisplay').textContent=a;
  document.getElementById('compBDisplay').textContent=b;
  document.getElementById('compAValue').textContent=a;
  document.getElementById('compBValue').textContent=b;
  document.getElementById('compAxis').innerHTML=axisHTML({points:[[0,'0'],[a,'a='+a],[b,'b='+b]],min:-12,max:12,step:2,segment:true});
  let text;
  if(av>bv) text='|'+a+'| = '+av+' and |'+b+'| = '+bv+', so |'+a+'| is greater.';
  else if(av<bv) text='|'+a+'| = '+av+' and |'+b+'| = '+bv+', so |'+b+'| is greater.';
  else text='|'+a+'| = '+av+' and |'+b+'| = '+bv+', so they are equal.';
  document.getElementById('compFormula').textContent=text;
}
function updateDistanceLab(){
  const aEl=document.getElementById('distA'),bEl=document.getElementById('distB');if(!aEl||!bEl)return;
  const a=Number(aEl.value),b=Number(bEl.value),dist=Math.abs(b-a);
  document.getElementById('distADisplay').textContent=a;
  document.getElementById('distBDisplay').textContent=b;
  document.getElementById('distDisplay').textContent=dist;
  document.getElementById('distAValue').textContent=a;
  document.getElementById('distBValue').textContent=b;
  document.getElementById('distFormulaSmall').textContent='|'+b+' - ('+a+')|';
  document.getElementById('distAxis').innerHTML=axisHTML({points:[[a,'a='+a],[b,'b='+b]],min:-12,max:12,step:2,segment:true});
  document.getElementById('distFormula').textContent='Distance = |'+b+' - ('+a+')| = '+dist+'.';
}
function updateAllLabs(){updateAbsLab();updateOppositeLab();updateCompareLab();updateDistanceLab()}
function runSelfTests(){
  const required=['prevScene','nextScene','jumpScene','toggleTeacherPanel','toggleFullscreen','resetCurrentInteraction','checkAnswer','updateAbsLab','updateDistanceLab'];
  const missing=required.filter(name=>typeof window[name]!=='function');
  console.assert(missing.length===0,'Missing global functions:',missing);
  console.assert(scenes.length>=20,'Expected at least 20 scenes');
  console.assert(Math.abs(-7)===7,'absolute value test failed');
  console.info('Grade 4/5 Absolute Value Lab self-test complete. Missing functions:',missing.length?missing:'none');
}
function init(){
  sceneSelect.innerHTML='';
  scenes.forEach((s,i)=>{const opt=document.createElement('option');opt.value=i;opt.textContent=(i+1)+'. '+s.name;sceneSelect.appendChild(opt)});
  renderScene(0);
  setTimeout(runSelfTests,0);
}
Object.assign(window,{nextScene,prevScene,jumpScene,toggleTeacherPanel,toggleFullscreen,resetCurrentInteraction,checkAnswer,updateAbsLab,updateOppositeLab,updateCompareLab,updateDistanceLab});
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();nextScene()}
  if(e.key==='ArrowLeft'){e.preventDefault();prevScene()}
  if(e.key.toLowerCase()==='f'){e.preventDefault();toggleFullscreen()}
  if(e.key.toLowerCase()==='t'){e.preventDefault();toggleTeacherPanel()}
});
init();
})();
</script>
</body>
</html>
