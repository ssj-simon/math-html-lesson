name: Update README Links

on:
  push:
    paths:
      - '**.html'
      - '.github/workflows/update-readme.yml'
  pull_request:
    paths:
      - '**.html'

jobs:
  update-readme:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate README
        run: |
          python3 - <<'EOF'
          import os
          from pathlib import Path

          html_files = []
          for root, dirs, files in os.walk('.'):
              dirs[:] = [d for d in dirs if not d.startswith('.') and d not in ['node_modules', 'dist', 'build']]
              for file in files:
                  if file.endswith('.html'):
                      full_path = os.path.join(root, file).lstrip('./')
                      html_files.append(full_path)

          html_files.sort()

          readme_content = """# HTML Lessons

This repository contains interactive HTML presentations.

## Available Lessons

"""
          if html_files:
              for html_file in html_files:
                  filename = Path(html_file).stem
                  title = ' '.join(word.capitalize() for word in filename.replace('-', ' ').replace('_', ' ').split())
                  github_link = f"https://github.com/ssj-simon/math-html-lesson/blob/main/{html_file}"
                  readme_content += f"- [{title}]({github_link})\n"
          else:
              readme_content += "No HTML lessons found yet.\n"

          readme_content += "\n---\nAuto-generated by GitHub Actions"

          with open('README.md', 'w') as f:
              f.write(readme_content)
          EOF

      - name: Commit changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add README.md
          if git diff --cached --quiet; then
            echo "No changes to README"
          else
            git commit -m "chore: auto-update README with HTML links"
            git push
          fi
