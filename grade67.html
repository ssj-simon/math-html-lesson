<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lecture 16 — Exponents and Negative Numbers</title>
  <style>
    :root{
      --cyan:#6de8ff;--blue:#5b93ff;--green:#59f0a5;--yellow:#ffd86a;--orange:#ffad5c;
      --red:#ff6b89;--purple:#ad84ff;--white:#eef5ff;--muted:#adc0ea;
    }
    *{box-sizing:border-box}
    html,body{
      margin:0;width:100%;height:100%;overflow:hidden;
      font-family:Arial,Helvetica,sans-serif;color:var(--white);
      background:radial-gradient(circle at 18% 12%,#243f91,#0b1f49 32%,#061024 70%,#02040c);
    }
    .stars,.grid,.scan{position:absolute;inset:0;pointer-events:none}
    .stars{
      background-image:radial-gradient(circle,rgba(255,255,255,.35) 1px,transparent 1px),
      radial-gradient(circle,rgba(109,232,255,.22) 1px,transparent 1px);
      background-size:72px 72px,112px 112px;opacity:.42;animation:drift 18s linear infinite;
    }
    .grid{
      background-image:linear-gradient(rgba(109,232,255,.075) 1px,transparent 1px),
      linear-gradient(90deg,rgba(109,232,255,.075) 1px,transparent 1px);
      background-size:58px 58px;
      transform:perspective(760px) rotateX(62deg) translateY(35vh) scale(1.45);
      transform-origin:bottom center;opacity:.35;animation:gridMove 5.2s linear infinite;
    }
    .scan{
      background:repeating-linear-gradient(to bottom,rgba(255,255,255,.03),rgba(255,255,255,.03) 1px,transparent 1px,transparent 6px);
      opacity:.15;
    }
    @keyframes drift{from{transform:translateY(0)}to{transform:translateY(120px)}}
    @keyframes gridMove{from{background-position:0 0}to{background-position:0 58px}}
    .app{position:relative;width:100vw;height:100vh;padding:18px 20px 24px}
    .topbar{position:relative;z-index:30;display:flex;justify-content:space-between;align-items:center;gap:12px;margin-bottom:10px}
    .brand{display:flex;align-items:center;gap:12px}
    .logo{
      width:44px;height:44px;border-radius:50%;
      background:radial-gradient(circle at 35% 35%,#fff,var(--cyan) 35%,var(--blue) 70%,#102555);
      box-shadow:0 0 28px rgba(109,232,255,.45)
    }
    .brand-title{font-size:21px;font-weight:900}
    .brand-sub{font-size:12px;color:var(--muted);margin-top:3px}
    .top-controls{display:flex;gap:10px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
    .pill{
      padding:10px 14px;border-radius:999px;background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);color:var(--muted);font-size:13px;font-weight:800;
      max-width:460px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis
    }
    button{
      border:0;border-radius:999px;padding:11px 18px;cursor:pointer;font-weight:900;color:#071126;
      background:linear-gradient(135deg,var(--cyan),var(--blue));
      box-shadow:0 10px 24px rgba(91,147,255,.25);transition:.15s
    }
    button:hover{transform:translateY(-1px);filter:brightness(1.08)}
    button.secondary{color:var(--white);background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.15);box-shadow:none}
    button.green{background:linear-gradient(135deg,var(--green),#32d28e);color:#06261a}
    button.yellow{background:linear-gradient(135deg,var(--yellow),#ffb93c);color:#2a1a00}
    button.red{background:linear-gradient(135deg,#ff96aa,var(--red));color:#30000b}
    .stage{
      position:relative;z-index:10;height:calc(100vh - 118px);border-radius:30px;overflow:hidden;
      border:1px solid rgba(255,255,255,.08);
      background:linear-gradient(135deg,rgba(12,25,58,.86),rgba(5,11,28,.86));
      box-shadow:0 30px 80px rgba(0,0,0,.38),inset 0 0 60px rgba(109,232,255,.04)
    }
    .scene{
      position:absolute;inset:0;padding:40px 42px 88px;
      display:grid;grid-template-columns:1.02fr .98fr;gap:28px;align-items:center;
      animation:sceneIn .38s ease both;
    }
    @keyframes sceneIn{from{opacity:0;transform:translateY(14px) scale(.985)}to{opacity:1;transform:translateY(0) scale(1)}}
    .panel{
      background:linear-gradient(135deg,rgba(19,36,84,.78),rgba(10,17,42,.72));
      border:1px solid rgba(109,232,255,.16);border-radius:28px;padding:30px;
      box-shadow:inset 0 0 35px rgba(109,232,255,.04)
    }
    .kicker{
      display:inline-block;padding:8px 14px;border-radius:999px;background:rgba(109,232,255,.1);
      border:1px solid rgba(109,232,255,.18);color:var(--cyan);text-transform:uppercase;
      letter-spacing:.1em;font-size:12px;font-weight:900;margin-bottom:16px
    }
    .title{
      font-size:clamp(34px,4.5vw,68px);line-height:.98;font-weight:900;margin:0 0 14px;
      letter-spacing:-.04em;text-shadow:0 0 30px rgba(109,232,255,.18)
    }
    .subtitle{font-size:clamp(18px,2vw,27px);line-height:1.35;color:var(--muted);margin:0 0 18px}
    .body-text{font-size:clamp(20px,2.05vw,30px);line-height:1.42;margin:0 0 16px;color:#edf5ff}
    .small{color:var(--muted);font-size:16px;line-height:1.5}
    .green-text{color:var(--green);font-weight:900}.yellow-text{color:var(--yellow);font-weight:900}
    .red-text{color:var(--red);font-weight:900}.cyan-text{color:var(--cyan);font-weight:900}
    .purple-text{color:var(--purple);font-weight:900}.orange-text{color:var(--orange);font-weight:900}
    .bullets{display:grid;gap:12px;margin-top:18px}
    .bullet{
      display:flex;gap:12px;align-items:flex-start;background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);border-radius:18px;padding:14px 16px;
      font-size:20px;line-height:1.4
    }
    .icon{
      width:34px;height:34px;border-radius:12px;background:rgba(109,232,255,.12);color:var(--cyan);
      display:flex;align-items:center;justify-content:center;font-weight:900;flex:0 0 auto
    }
    .visual{min-height:460px;display:flex;align-items:center;justify-content:center;position:relative}
    .big-orb{
      width:min(32vw,360px);height:min(32vw,360px);border-radius:50%;
      background:conic-gradient(from 0deg,rgba(109,232,255,.12),rgba(173,132,255,.5),rgba(89,240,165,.15),rgba(255,216,106,.18),rgba(109,232,255,.12));
      box-shadow:0 0 90px rgba(109,232,255,.16),inset 0 0 45px rgba(0,0,0,.35);
      animation:spin 10s linear infinite;position:relative
    }
    .big-orb:before{
      content:"EXPONENTS";position:absolute;inset:22%;border-radius:50%;
      display:flex;align-items:center;justify-content:center;text-align:center;
      background:rgba(3,8,24,.82);color:var(--cyan);
      font-size:clamp(18px,1.8vw,30px);font-weight:900;letter-spacing:.12em;padding:18px
    }
    @keyframes spin{to{transform:rotate(360deg)}}
    .equation-card{
      width:100%;max-width:650px;padding:28px;border-radius:24px;background:rgba(255,255,255,.07);
      border:1px solid rgba(255,255,255,.12);text-align:center;
      font-size:clamp(28px,3.7vw,52px);font-weight:900;line-height:1.34;
      white-space:pre-line;box-shadow:0 0 34px rgba(109,232,255,.06)
    }
    .equation-card.left{text-align:left;font-size:clamp(23px,2.8vw,39px)}
    sup{font-size:.58em;vertical-align:super}
    .map-grid{display:grid;grid-template-columns:repeat(2,minmax(180px,1fr));gap:16px;margin-top:20px}
    .map-card{
      min-height:112px;border-radius:20px;padding:18px;background:rgba(255,255,255,.06);
      border:1px solid rgba(109,232,255,.12);position:relative;overflow:hidden
    }
    .map-card:after{
      content:"";position:absolute;left:-60%;top:0;width:45%;height:100%;
      background:linear-gradient(90deg,transparent,rgba(109,232,255,.15),transparent);
      animation:shine 4.5s ease-in-out infinite
    }
    @keyframes shine{0%{left:-60%}55%,100%{left:130%}}
    .map-card h4{margin:0 0 8px;color:var(--cyan);font-size:22px}
    .map-card p{margin:0;color:var(--muted);font-size:15px;line-height:1.4}
    .lab-box{
      width:100%;max-width:820px;padding:26px;border-radius:28px;background:rgba(255,255,255,.07);
      border:1px solid rgba(109,232,255,.16);box-shadow:inset 0 0 30px rgba(109,232,255,.04)
    }
    .bar-row{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:14px}
    .stat-box{background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.10);border-radius:18px;padding:14px}
    .stat-box h4{margin:0 0 8px;color:var(--cyan);font-size:16px}
    .stat-value{font-size:25px;font-weight:900;color:var(--white);word-break:break-word}
    .slider-wrap{margin-top:15px}
    .slider-wrap label{display:flex;justify-content:space-between;margin-bottom:8px;color:var(--muted);font-size:14px;font-weight:800}
    .slider-wrap input[type=range], .slider-wrap select{width:100%;accent-color:var(--cyan)}
    .slider-wrap select{
      padding:10px 12px;border-radius:14px;border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.07);color:var(--white);font-weight:800;font-size:16px
    }
    .formula-panel{
      margin-top:16px;padding:16px;border-radius:18px;background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.10);font-size:22px;font-weight:900;text-align:center
    }
    .factor-row{display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin:18px 0}
    .factor{
      width:54px;height:54px;border-radius:16px;background:linear-gradient(135deg,var(--cyan),var(--blue));
      color:#061024;font-size:24px;font-weight:900;display:flex;align-items:center;justify-content:center;
      box-shadow:0 0 18px rgba(109,232,255,.22)
    }
    .factor.neg{background:linear-gradient(135deg,var(--red),var(--orange));color:#2a0010}
    .growth-bars{display:grid;gap:10px;margin-top:16px}
    .growth-row{display:grid;grid-template-columns:80px 1fr 80px;gap:10px;align-items:center}
    .growth-label,.growth-value{font-weight:900;color:var(--white)}
    .growth-bar{height:24px;border-radius:999px;background:rgba(255,255,255,.08);overflow:hidden;border:1px solid rgba(255,255,255,.1)}
    .growth-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--green),var(--cyan));transition:.3s}
    .quiz-card{
      width:100%;max-width:820px;padding:28px;border-radius:28px;
      background:linear-gradient(135deg,rgba(109,232,255,.09),rgba(173,132,255,.08));
      border:1px solid rgba(109,232,255,.18)
    }
    .quiz-question{font-size:clamp(24px,2.6vw,37px);font-weight:900;line-height:1.25;margin:0 0 20px}
    .choices{display:grid;grid-template-columns:1fr 1fr;gap:14px}
    .choice{
      border-radius:18px;padding:18px 20px;font-size:21px;font-weight:900;color:var(--white);text-align:left;
      background:rgba(255,255,255,.08);border:1px solid rgba(255,255,255,.12);box-shadow:none
    }
    .choice.correct{background:rgba(89,240,165,.18);border-color:rgba(89,240,165,.55);color:var(--green)}
    .choice.wrong{background:rgba(255,107,137,.18);border-color:rgba(255,107,137,.55);color:var(--red)}
    .feedback{
      margin-top:16px;border-radius:18px;padding:16px 18px;font-size:20px;line-height:1.35;font-weight:800;display:none
    }
    .feedback.show{display:block}.feedback.good{background:rgba(89,240,165,.14);border:1px solid rgba(89,240,165,.4);color:#dfffee}
    .feedback.bad{background:rgba(255,107,137,.14);border:1px solid rgba(255,107,137,.4);color:#ffe4ea}
    .answer-pop{
      position:absolute;right:42px;bottom:96px;z-index:30;padding:18px 24px;border-radius:24px;
      font-size:42px;font-weight:900;background:rgba(0,0,0,.52);border:1px solid rgba(255,255,255,.16);
      box-shadow:0 0 45px rgba(109,232,255,.12);display:none
    }
    .answer-pop.show{display:block}.answer-pop.good{color:var(--green)}.answer-pop.bad{color:var(--red)}
    .footer{
      position:absolute;left:0;right:0;bottom:0;z-index:18;display:flex;justify-content:center;align-items:center;
      gap:10px;padding:16px 20px 18px;background:linear-gradient(180deg,rgba(3,7,18,0),rgba(3,7,18,.5))
    }
    .scene-count{min-width:96px;text-align:center;color:var(--muted);font-size:13px;font-weight:800}
    .teacher-panel{
      position:absolute;right:22px;top:70px;width:390px;max-width:calc(100vw - 44px);z-index:70;
      background:rgba(8,15,37,.96);border:1px solid rgba(109,232,255,.18);border-radius:22px;padding:18px;
      box-shadow:0 20px 55px rgba(0,0,0,.38);display:none
    }
    .teacher-panel.show{display:block}.teacher-panel h3{margin:0 0 12px;color:var(--cyan);font-size:20px}
    .teacher-panel label{display:block;margin:12px 0 6px;font-size:13px;color:var(--muted);font-weight:800}
    .teacher-panel select{
      width:100%;padding:10px 12px;border-radius:12px;border:1px solid rgba(255,255,255,.14);
      background:rgba(255,255,255,.05);color:var(--white);outline:none;font-size:14px
    }
    .teacher-panel .row{display:flex;gap:10px;margin-top:12px;flex-wrap:wrap}.teacher-panel .row button{flex:1;min-width:105px}
    .teacher-note{margin-top:12px;color:var(--muted);font-size:12px;line-height:1.45}
    @media(max-width:980px){
      .scene{grid-template-columns:1fr;overflow:auto;padding:28px 20px 88px}.visual{min-height:260px}
      .choices{grid-template-columns:1fr}.map-grid{grid-template-columns:1fr}.bar-row{grid-template-columns:1fr}
      .topbar{flex-direction:column;align-items:stretch}.top-controls{justify-content:flex-start}
    }
  </style>
</head>
<body>
  <div class="stars"></div><div class="grid"></div><div class="scan"></div>
  <div class="app">
    <div class="topbar">
      <div class="brand"><div class="logo"></div><div><div class="brand-title">Lecture 16 — Exponents</div><div class="brand-sub">Negative Numbers · Multiplication · Division · Zero and Negative Exponents</div></div></div>
      <div class="top-controls"><div class="pill" id="sceneNamePill">Scene</div><button class="secondary" type="button" onclick="window.toggleTeacherPanel()">Teacher Panel</button><button class="secondary" type="button" onclick="window.toggleFullscreen()">Fullscreen</button></div>
    </div>
    <div class="teacher-panel" id="teacherPanel">
      <h3>Teacher Panel</h3>
      <label>Jump to Scene</label><select id="sceneSelect"></select>
      <div class="row"><button type="button" onclick="window.jumpScene()">Go</button><button class="secondary" type="button" onclick="window.prevScene()">Back</button><button class="secondary" type="button" onclick="window.nextScene()">Next</button></div>
      <div class="row"><button class="secondary" type="button" onclick="window.resetCurrentInteraction()">Reset Interaction</button></div>
      <div class="teacher-note">Keyboard: → next, ← back, F fullscreen, T teacher panel. Final page sends students to Google Classroom.</div>
    </div>
    <div class="stage"><div id="sceneContainer"></div><div class="answer-pop" id="answerPop"></div><div class="footer"><button class="secondary" type="button" onclick="window.prevScene()">← Back</button><div class="scene-count" id="sceneCount">1 / 1</div><button type="button" onclick="window.nextScene()">Next →</button></div></div>
  </div>
<script>
(function(){
'use strict';

const scenes=[
{name:'Cover',kind:'content',kicker:'Lecture 16',title:'Exponents and Negative Numbers',subtitle:'Base, exponent, negative base, division rules, zero and negative exponents.',body:'This lesson focuses on exponent meaning and rules, especially with negative numbers and division. No big story theme — just clear interactive math.',bullets:['Exponent basics: base and exponent','Negative base and parentheses','Multiplication and division rules','Zero exponent and negative exponent extension'],visual:'cover'},
{name:'Roadmap',kind:'content',kicker:'Lesson Map',title:'What We Will Learn',subtitle:'Exponent rules are patterns of repeated multiplication.',body:'The main goal is to read expressions carefully, especially when there are negative signs, parentheses, multiplication, and division.',visual:'map'},
{name:'Exponent Meaning',kind:'content',kicker:'Concept 1',title:'What Is an Exponent?',subtitle:'An exponent tells how many times to use the base as a factor.',body:'For example, 2³ means 2 × 2 × 2. The base is 2. The exponent is 3.',equation:'2³ = 2 × 2 × 2 = 8\n5² = 5 × 5 = 25',bullets:['Base = repeated factor','Exponent = number of times','Exponent does not mean multiply by the exponent'],visual:'equation'},
{name:'Exponent Builder',kind:'builderLab',kicker:'Interactive Lab',title:'Exponent Builder',subtitle:'Change the base and exponent to see the repeated multiplication.',body:'Use this to show that 3⁴ means 3 × 3 × 3 × 3, not 3 × 4.'},
{name:'Mini Check 1',kind:'quiz',kicker:'Mini Check',title:'Exponent Meaning',question:'What is 4³?',choices:['12','16','64','81'],correct:2,explanation:'4³ means 4 × 4 × 4 = 64. It does not mean 4 × 3.'},
{name:'Common Mistake',kind:'content',kicker:'Trap',title:'Common Mistake: 3² ≠ 3 × 2',subtitle:'The exponent tells repeated multiplication, not ordinary multiplication.',body:'3² means 3 × 3, which is 9. It does not mean 3 × 2, which is 6.',equation:'3² = 3 × 3 = 9\n3 × 2 = 6\nSo 3² ≠ 3 × 2',bullets:['Read the exponent first','Expand if you are unsure','Repeated multiplication is the key'],visual:'equation'},
{name:'Growth Lab',kind:'growthLab',kicker:'Interactive Lab',title:'Exponent Growth',subtitle:'Exponents grow fast because we repeatedly multiply.',body:'Choose a base and compare powers from 1 to 6. The bars show how quickly the values grow.'},
{name:'Mini Check 2',kind:'quiz',kicker:'Mini Check',title:'Growth Check',question:'Which is larger?',choices:['2⁵','5²','They are equal','Cannot be determined'],correct:0,explanation:'2⁵ = 32 and 5² = 25, so 2⁵ is larger.'},
{name:'Negative Base',kind:'content',kicker:'Concept 2',title:'Negative Base',subtitle:'A negative base can produce positive or negative results.',body:'If the negative number is inside parentheses, the negative sign is part of the base. Even exponent gives positive. Odd exponent gives negative.',equation:'(-2)² = 4\n(-2)³ = -8\n(-3)⁴ = 81',bullets:['Even exponent: positive result','Odd exponent: negative result','Parentheses tell us the negative sign is part of the base'],visual:'equation'},
{name:'Negative Base Lab',kind:'negativeLab',kicker:'Interactive Lab',title:'Negative Base Lab',subtitle:'Change the exponent to see the sign switch.',body:'A negative base alternates signs: odd exponents are negative, even exponents are positive.'},
{name:'Mini Check 3',kind:'quiz',kicker:'Mini Check',title:'Negative Base',question:'What is (-3)³?',choices:['-27','-9','9','27'],correct:0,explanation:'(-3)³ = (-3) × (-3) × (-3) = -27. Odd exponent keeps the result negative.'},
{name:'Parentheses Matter',kind:'content',kicker:'Important Trap',title:'Parentheses Matter',subtitle:'(-3)² and -3² are not the same.',body:'With parentheses, the base is -3. Without parentheses, the exponent applies only to 3, and the negative sign stays outside.',equation:'(-3)² = (-3)(-3) = 9\n-3² = -(3²) = -9',bullets:['(-3)²: base is -3','-3²: base is 3, then apply outside negative','This is one of the most common mistakes'],visual:'equation'},
{name:'Mini Check 4',kind:'quiz',kicker:'Mini Check',title:'Parentheses Trap',question:'Which expression equals -16?',choices:['(-4)²','-4²','(-2)⁴','4²'],correct:1,explanation:'-4² means -(4²) = -16. Parentheses would make it positive: (-4)² = 16.'},
{name:'Multiplication Rule',kind:'content',kicker:'Concept 3',title:'Multiplying Powers with the Same Base',subtitle:'Same base → add exponents.',body:'When multiplying powers with the same base, combine all repeated factors. The number of factors adds.',equation:'2³ × 2⁴ = 2³⁺⁴ = 2⁷\nx² × x⁵ = x⁷',bullets:['The bases must be the same','Add the exponents','Do not multiply the exponents'],visual:'equation'},
{name:'Multiplication Lab',kind:'productLab',kicker:'Interactive Lab',title:'Product Rule Lab',subtitle:'Choose two exponents and watch them combine.',body:'Same base means we can add exponents.'},
{name:'Mini Check 5',kind:'quiz',kicker:'Mini Check',title:'Product Rule',question:'What is 5² × 5³?',choices:['5⁵','5⁶','25⁵','10⁵'],correct:0,explanation:'Same base 5, so add the exponents: 5² × 5³ = 5⁵.'},
{name:'Division Rule',kind:'content',kicker:'Concept 4',title:'Dividing Powers with the Same Base',subtitle:'Same base → subtract exponents.',body:'When dividing powers with the same base, repeated factors cancel. The remaining exponent is the difference.',equation:'5⁶ ÷ 5² = 5⁶⁻² = 5⁴\nx⁷ ÷ x³ = x⁴',bullets:['The bases must be the same','Subtract the exponents','Top exponent minus bottom exponent'],visual:'equation'},
{name:'Division Lab',kind:'divisionLab',kicker:'Interactive Lab',title:'Division Rule Lab',subtitle:'Choose the base, top exponent, and bottom exponent.',body:'This lab includes positive bases, negative bases, zero exponents, and negative exponent results.'},
{name:'Mini Check 6',kind:'quiz',kicker:'Mini Check',title:'Division Rule',question:'What is 2⁷ ÷ 2³?',choices:['2⁴','2¹⁰','4²','1²'],correct:0,explanation:'Same base 2, so subtract the exponents: 2⁷ ÷ 2³ = 2⁴.'},
{name:'Negative Base in Division',kind:'content',kicker:'Concept 5',title:'Negative Base in Division',subtitle:'The base and parentheses still matter.',body:'If both powers have the same negative base, you can still subtract exponents. Then evaluate the remaining power carefully.',equation:'(-2)⁵ ÷ (-2)² = (-2)³ = -8\n(-3)⁴ ÷ (-3)² = (-3)² = 9',bullets:['Check that the bases match','Subtract exponents','Then evaluate the remaining negative-base power'],visual:'equation'},
{name:'Mini Check 7',kind:'quiz',kicker:'Mini Check',title:'Negative Base Division',question:'What is (-2)⁵ ÷ (-2)²?',choices:['-8','8','-4','4'],correct:0,explanation:'Same base (-2), so subtract exponents: (-2)⁵ ÷ (-2)² = (-2)³ = -8.'},
{name:'Zero Exponent',kind:'content',kicker:'Concept 6',title:'Zero Exponent',subtitle:'Any nonzero number to the zero power equals 1.',body:'We can see this from division. A number divided by itself is 1, and subtracting equal exponents gives exponent 0.',equation:'7³ ÷ 7³ = 1\n7³ ÷ 7³ = 7³⁻³ = 7⁰\nSo 7⁰ = 1',bullets:['a⁰ = 1 when a is not 0','This comes from division','Do not confuse a⁰ with 0'],visual:'equation'},
{name:'Mini Check 8',kind:'quiz',kicker:'Mini Check',title:'Zero Exponent',question:'What is (-5)⁰?',choices:['-5','0','1','5'],correct:2,explanation:'Any nonzero base to the zero power equals 1, so (-5)⁰ = 1.'},
{name:'Negative Exponent',kind:'content',kicker:'Extension',title:'Negative Exponents',subtitle:'A negative exponent means reciprocal.',body:'Negative exponents can happen when the bottom exponent is larger than the top exponent in division.',equation:'2³ ÷ 2⁵ = 2³⁻⁵ = 2⁻²\n2⁻² = 1/2² = 1/4',bullets:['a⁻ⁿ = 1/aⁿ','This is connected to division','Keep this as an extension if needed'],visual:'equation'},
{name:'Mini Check 9',kind:'quiz',kicker:'Mini Check',title:'Negative Exponent',question:'What is 3⁻²?',choices:['-9','-6','1/6','1/9'],correct:3,explanation:'3⁻² = 1/3² = 1/9.'},

let current=0;
const sceneContainer=document.getElementById('sceneContainer');
const sceneCount=document.getElementById('sceneCount');
const sceneNamePill=document.getElementById('sceneNamePill');
const sceneSelect=document.getElementById('sceneSelect');
const teacherPanel=document.getElementById('teacherPanel');
const answerPop=document.getElementById('answerPop');

function pow(base,exp){
  return Math.pow(base,exp);
}
function safe(str){
  return String(str||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}
function formatNum(n){
  if(!Number.isFinite(n)) return 'undefined';
  const x=Number(n);
  if(Math.abs(x)>999999) return x.toExponential(2);
  return Number.isInteger(x)?String(x):x.toFixed(4).replace(/0+$/,'').replace(/\.$/,'');
}
function sup(n){
  const map={'-':'⁻','0':'⁰','1':'¹','2':'²','3':'³','4':'⁴','5':'⁵','6':'⁶','7':'⁷','8':'⁸','9':'⁹'};
  return String(n).split('').map(ch=>map[ch]||ch).join('');
}
function powerText(base,exp){
  if(base<0) return '('+base+')'+sup(exp);
  return String(base)+sup(exp);
}
function repeatedFactors(base,exp){
  if(exp===0) return '1';
  if(exp<0) return '1 / ('+Array.from({length:Math.abs(exp)},()=>base<0?'('+base+')':String(base)).join(' × ')+')';
  return Array.from({length:exp},()=>base<0?'('+base+')':String(base)).join(' × ');
}
function renderFactorBlocks(base,exp){
  const count=Math.min(Math.abs(exp),12);
  if(exp===0) return '<div class="factor-row"><div class="factor">1</div></div>';
  let html='<div class="factor-row">';
  for(let i=0;i<count;i++) html+='<div class="factor '+(base<0?'neg':'')+'">'+safe(String(base))+'</div>';
  if(Math.abs(exp)>12) html+='<div class="factor">...</div>';
  html+='</div>';
  return html;
}
function cubeHTML(){
  return '';
}
function renderContent(s){
  let left='<div class="panel"><div class="kicker">'+safe(s.kicker)+'</div><h1 class="title">'+safe(s.title)+'</h1>';
  if(s.subtitle)left+='<p class="subtitle">'+safe(s.subtitle)+'</p>';
  if(s.body)left+='<p class="body-text">'+safe(s.body)+'</p>';
  if(s.bullets)left+='<div class="bullets">'+s.bullets.map(b=>'<div class="bullet"><div class="icon">•</div><div>'+safe(b)+'</div></div>').join('')+'</div>';
  left+='</div>';
  return '<div class="scene"><div>'+left+'</div><div>'+renderVisual(s)+'</div></div>';
}
function renderQuiz(s){
  const choices=s.choices.map((c,i)=>'<button type="button" class="choice" onclick="window.checkAnswer('+i+')">'+String.fromCharCode(65+i)+') '+safe(c)+'</button>').join('');
  return '<div class="scene"><div><div class="panel"><div class="kicker">'+safe(s.kicker)+'</div><h1 class="title">'+safe(s.title)+'</h1><p class="subtitle">Click an answer to check immediately.</p><div class="bullets"><div class="bullet"><div class="icon">✓</div><div>If correct, the screen shows <span class="green-text">Correct!</span></div></div><div class="bullet"><div class="icon">×</div><div>If wrong, the screen shows <span class="red-text">Try Again</span></div></div></div></div></div><div class="visual"><div class="quiz-card"><p class="quiz-question">'+safe(s.question)+'</p><div class="choices">'+choices+'</div><div id="feedback" class="feedback"></div></div></div></div>';
}
function renderBuilderLab(s){
  return '<div class="scene"><div><div class="panel"><div class="kicker">'+safe(s.kicker)+'</div><h1 class="title">'+safe(s.title)+'</h1><p class="subtitle">'+safe(s.subtitle)+'</p><p class="body-text">'+safe(s.body)+'</p><div class="bullets"><div class="bullet"><div class="icon">b</div><div>Base is the repeated factor.</div></div><div class="bullet"><div class="icon">n</div><div>Exponent tells how many times.</div></div></div></div></div><div class="visual"><div class="lab-box"><div class="body-text" style="margin-top:0">Exponent Builder</div><div class="bar-row"><div class="stat-box"><h4>Power</h4><div class="stat-value" id="builderPower">3⁴</div></div><div class="stat-box"><h4>Value</h4><div class="stat-value" id="builderValue">81</div></div></div><div class="slider-wrap"><label><span>Base</span><span id="builderBaseValue">3</span></label><input id="builderBase" type="range" min="2" max="8" step="1" value="3" oninput="window.updateBuilderLab()"></div><div class="slider-wrap"><label><span>Exponent</span><span id="builderExpValue">4</span></label><input id="builderExp" type="range" min="0" max="6" step="1" value="4" oninput="window.updateBuilderLab()"></div><div id="builderFactors"></div><div class="formula-panel" id="builderFormula">3⁴ = 3 × 3 × 3 × 3 = 81</div></div></div></div>';
}
function renderGrowthLab(s){
  return '<div class="scene"><div><div class="panel"><div class="kicker">'+safe(s.kicker)+'</div><h1 class="title">'+safe(s.title)+'</h1><p class="subtitle">'+safe(s.subtitle)+'</p><p class="body-text">'+safe(s.body)+'</p></div></div><div class="visual"><div class="lab-box"><div class="body-text" style="margin-top:0">Growth Chart</div><div class="slider-wrap"><label><span>Base</span><span id="growthBaseValue">2</span></label><input id="growthBase" type="range" min="2" max="5" step="1" value="2" oninput="window.updateGrowthLab()"></div><div class="growth-bars" id="growthBars"></div><div class="formula-panel" id="growthNote">2⁶ = 64</div></div></div></div>';
}
function renderNegativeLab(s){
  return '<div class="scene"><div><div class="panel"><div class="kicker">'+safe(s.kicker)+'</div><h1 class="title">'+safe(s.title)+'</h1><p class="subtitle">'+safe(s.subtitle)+'</p><p class="body-text">'+safe(s.body)+'</p></div></div><div class="visual"><div class="lab-box"><div class="body-text" style="margin-top:0">Negative Base Lab</div><div class="bar-row"><div class="stat-box"><h4>Expression</h4><div class="stat-value" id="negExpression">(-2)³</div></div><div class="stat-box"><h4>Value</h4><div class="stat-value" id="negValue">-8</div></div></div><div class="slider-wrap"><label><span>Negative Base</span><span id="negBaseValue">-2</span></label><input id="negBase" type="range" min="-6" max="-2" step="1" value="-2" oninput="window.updateNegativeLab()"></div><div class="slider-wrap"><label><span>Exponent</span><span id="negExpValue">3</span></label><input id="negExp" type="range" min="1" max="8" step="1" value="3" oninput="window.updateNegativeLab()"></div><div id="negFactors"></div><div class="formula-panel" id="negRule">Odd exponent → negative result</div></div></div></div>';
}
function renderProductLab(s){
  return '<div class="scene"><div><div class="panel"><div class="kicker">'+safe(s.kicker)+'</div><h1 class="title">'+safe(s.title)+'</h1><p class="subtitle">'+safe(s.subtitle)+'</p><p class="body-text">'+safe(s.body)+'</p></div></div><div class="visual"><div class="lab-box"><div class="body-text" style="margin-top:0">Product Rule</div><div class="bar-row"><div class="stat-box"><h4>Expression</h4><div class="stat-value" id="prodExpression">2³ × 2⁴</div></div><div class="stat-box"><h4>Rule</h4><div class="stat-value" id="prodRule">2⁷</div></div></div><div class="slider-wrap"><label><span>Base</span><span id="prodBaseValue">2</span></label><input id="prodBase" type="range" min="2" max="6" step="1" value="2" oninput="window.updateProductLab()"></div><div class="slider-wrap"><label><span>First exponent</span><span id="prodAValue">3</span></label><input id="prodA" type="range" min="1" max="6" step="1" value="3" oninput="window.updateProductLab()"></div><div class="slider-wrap"><label><span>Second exponent</span><span id="prodBValue">4</span></label><input id="prodB" type="range" min="1" max="6" step="1" value="4" oninput="window.updateProductLab()"></div><div class="formula-panel" id="prodFormula">2³ × 2⁴ = 2³⁺⁴ = 2⁷</div></div></div></div>';
}
function renderDivisionLab(s){
  return '<div class="scene"><div><div class="panel"><div class="kicker">'+safe(s.kicker)+'</div><h1 class="title">'+safe(s.title)+'</h1><p class="subtitle">'+safe(s.subtitle)+'</p><p class="body-text">'+safe(s.body)+'</p><div class="bullets"><div class="bullet"><div class="icon">÷</div><div>Same base → subtract exponents.</div></div><div class="bullet"><div class="icon">0</div><div>Equal exponents lead to a zero exponent.</div></div><div class="bullet"><div class="icon">−</div><div>If bottom exponent is larger, the result has a negative exponent.</div></div></div></div></div><div class="visual"><div class="lab-box"><div class="body-text" style="margin-top:0">Division Rule Lab</div><div class="bar-row"><div class="stat-box"><h4>Expression</h4><div class="stat-value" id="divExpression">2⁵ ÷ 2²</div></div><div class="stat-box"><h4>Result</h4><div class="stat-value" id="divResult">2³ = 8</div></div></div><div class="slider-wrap"><label><span>Base</span><span id="divBaseValue">2</span></label><select id="divBase" onchange="window.updateDivisionLab()"><option value="2">2</option><option value="3">3</option><option value="4">4</option><option value="-2">-2</option><option value="-3">-3</option></select></div><div class="slider-wrap"><label><span>Top exponent</span><span id="divTopValue">5</span></label><input id="divTop" type="range" min="0" max="8" step="1" value="5" oninput="window.updateDivisionLab()"></div><div class="slider-wrap"><label><span>Bottom exponent</span><span id="divBottomValue">2</span></label><input id="divBottom" type="range" min="0" max="8" step="1" value="2" oninput="window.updateDivisionLab()"></div><div class="formula-panel" id="divFormula">2⁵ ÷ 2² = 2⁵⁻² = 2³ = 8</div></div></div></div>';
}
function renderVisual(s){
  if(s.visual==='cover')return '<div class="visual"><div class="big-orb"></div></div>';
  if(s.visual==='map')return '<div class="visual"><div class="panel" style="width:100%;max-width:700px"><div class="map-grid"><div class="map-card"><h4>Basics</h4><p>Base and exponent.</p></div><div class="map-card"><h4>Negative Base</h4><p>Parentheses and parity.</p></div><div class="map-card"><h4>Multiplication</h4><p>Same base: add exponents.</p></div><div class="map-card"><h4>Division</h4><p>Same base: subtract exponents.</p></div></div></div></div>';
  if(s.visual==='equation')return '<div class="visual"><div class="equation-card left">'+safe(s.equation)+'</div></div>';
  if(s.visual==='classroom')return '<div class="visual"><div class="lab-box"><div class="body-text" style="margin-top:0">Google Classroom</div><div class="equation-card" style="font-size:36px">Open Classroom<br>Find Week16<br>Start your Google Form</div></div></div>';
  return '<div class="visual"><div class="big-orb"></div></div>';
}
function renderScene(i){
  current=Math.max(0,Math.min(scenes.length-1,i));
  const s=scenes[current];
  if(s.kind==='quiz')sceneContainer.innerHTML=renderQuiz(s);
  else if(s.kind==='builderLab')sceneContainer.innerHTML=renderBuilderLab(s);
  else if(s.kind==='growthLab')sceneContainer.innerHTML=renderGrowthLab(s);
  else if(s.kind==='negativeLab')sceneContainer.innerHTML=renderNegativeLab(s);
  else if(s.kind==='productLab')sceneContainer.innerHTML=renderProductLab(s);
  else if(s.kind==='divisionLab')sceneContainer.innerHTML=renderDivisionLab(s);
  else sceneContainer.innerHTML=renderContent(s);
  sceneCount.textContent=(current+1)+' / '+scenes.length;
  sceneNamePill.textContent=(current+1)+'. '+s.name;
  sceneSelect.value=String(current);
  answerPop.className='answer-pop';
  updateAllLabs();
}
function nextScene(){renderScene(current+1)}
function prevScene(){renderScene(current-1)}
function jumpScene(){renderScene(Number(sceneSelect.value))}
function toggleTeacherPanel(){teacherPanel.classList.toggle('show')}
function toggleFullscreen(){if(!document.fullscreenElement)document.documentElement.requestFullscreen();else document.exitFullscreen()}
function checkAnswer(idx){
  const s=scenes[current];if(!s||s.kind!=='quiz')return;
  const buttons=[...document.querySelectorAll('.choice')];
  buttons.forEach((b,i)=>{b.classList.remove('correct','wrong');if(i===s.correct)b.classList.add('correct')});
  const fb=document.getElementById('feedback');
  if(idx===s.correct){fb.className='feedback good show';fb.innerHTML='<strong>Correct!</strong><br>'+safe(s.explanation);showPop('Correct!','good')}
  else{buttons[idx].classList.add('wrong');fb.className='feedback bad show';fb.innerHTML='<strong>Try Again.</strong><br>'+safe(s.explanation);showPop('Try Again','bad')}
}
function showPop(text,type){answerPop.textContent=text;answerPop.className='answer-pop '+type+' show';setTimeout(()=>answerPop.className='answer-pop',1400)}
function resetCurrentInteraction(){
  const kind=scenes[current].kind;
  if(kind==='quiz'){const fb=document.getElementById('feedback');if(fb)fb.className='feedback';document.querySelectorAll('.choice').forEach(b=>b.classList.remove('correct','wrong'));answerPop.className='answer-pop'}
  if(kind==='builderLab'){document.getElementById('builderBase').value=3;document.getElementById('builderExp').value=4;updateBuilderLab()}
  if(kind==='growthLab'){document.getElementById('growthBase').value=2;updateGrowthLab()}
  if(kind==='negativeLab'){document.getElementById('negBase').value=-2;document.getElementById('negExp').value=3;updateNegativeLab()}
  if(kind==='productLab'){document.getElementById('prodBase').value=2;document.getElementById('prodA').value=3;document.getElementById('prodB').value=4;updateProductLab()}
  if(kind==='divisionLab'){document.getElementById('divBase').value=2;document.getElementById('divTop').value=5;document.getElementById('divBottom').value=2;updateDivisionLab()}
}
function updateBuilderLab(){
  const bEl=document.getElementById('builderBase'),eEl=document.getElementById('builderExp');if(!bEl||!eEl)return;
  const b=Number(bEl.value),e=Number(eEl.value),val=pow(b,e);
  document.getElementById('builderBaseValue').textContent=b;
  document.getElementById('builderExpValue').textContent=e;
  document.getElementById('builderPower').textContent=powerText(b,e);
  document.getElementById('builderValue').textContent=formatNum(val);
  document.getElementById('builderFactors').innerHTML=renderFactorBlocks(b,e);
  document.getElementById('builderFormula').textContent=powerText(b,e)+' = '+repeatedFactors(b,e)+' = '+formatNum(val);
}
function updateGrowthLab(){
  const bEl=document.getElementById('growthBase');if(!bEl)return;
  const b=Number(bEl.value),container=document.getElementById('growthBars');
  document.getElementById('growthBaseValue').textContent=b;
  const vals=[1,2,3,4,5,6].map(e=>pow(b,e));
  const max=Math.max(...vals);
  container.innerHTML=vals.map((v,i)=>{
    const e=i+1,pct=Math.max(4,Math.round(v/max*100));
    return '<div class="growth-row"><div class="growth-label">'+powerText(b,e)+'</div><div class="growth-bar"><div class="growth-fill" style="width:'+pct+'%"></div></div><div class="growth-value">'+formatNum(v)+'</div></div>';
  }).join('');
  document.getElementById('growthNote').textContent=powerText(b,6)+' = '+formatNum(pow(b,6));
}
function updateNegativeLab(){
  const bEl=document.getElementById('negBase'),eEl=document.getElementById('negExp');if(!bEl||!eEl)return;
  const b=Number(bEl.value),e=Number(eEl.value),val=pow(b,e);
  document.getElementById('negBaseValue').textContent=b;
  document.getElementById('negExpValue').textContent=e;
  document.getElementById('negExpression').textContent=powerText(b,e);
  document.getElementById('negValue').textContent=formatNum(val);
  document.getElementById('negFactors').innerHTML=renderFactorBlocks(b,e);
  document.getElementById('negRule').textContent=e%2===0?'Even exponent → positive result':'Odd exponent → negative result';
}
function updateProductLab(){
  const bEl=document.getElementById('prodBase'),aEl=document.getElementById('prodA'),cEl=document.getElementById('prodB');if(!bEl||!aEl||!cEl)return;
  const b=Number(bEl.value),a=Number(aEl.value),c=Number(cEl.value),sum=a+c;
  document.getElementById('prodBaseValue').textContent=b;
  document.getElementById('prodAValue').textContent=a;
  document.getElementById('prodBValue').textContent=c;
  document.getElementById('prodExpression').textContent=powerText(b,a)+' × '+powerText(b,c);
  document.getElementById('prodRule').textContent=powerText(b,sum);
  document.getElementById('prodFormula').textContent=powerText(b,a)+' × '+powerText(b,c)+' = '+b+sup(a)+'⁺'+sup(c)+' = '+powerText(b,sum)+' = '+formatNum(pow(b,sum));
}
function updateDivisionLab(){
  const bEl=document.getElementById('divBase'),tEl=document.getElementById('divTop'),btEl=document.getElementById('divBottom');if(!bEl||!tEl||!btEl)return;
  const b=Number(bEl.value),top=Number(tEl.value),bottom=Number(btEl.value),diff=top-bottom;
  document.getElementById('divBaseValue').textContent=b;
  document.getElementById('divTopValue').textContent=top;
  document.getElementById('divBottomValue').textContent=bottom;
  document.getElementById('divExpression').textContent=powerText(b,top)+' ÷ '+powerText(b,bottom);
  let resultText, formula;
  if(diff>=0){
    const val=pow(b,diff);
    resultText=powerText(b,diff)+' = '+formatNum(val);
    formula=powerText(b,top)+' ÷ '+powerText(b,bottom)+' = '+powerText(b,diff)+' = '+formatNum(val);
  }else{
    const pos=-diff;
    resultText=powerText(b,diff)+' = 1/'+powerText(b,pos);
    formula=powerText(b,top)+' ÷ '+powerText(b,bottom)+' = '+powerText(b,diff)+' = 1/'+powerText(b,pos);
  }
  document.getElementById('divResult').textContent=resultText;
  document.getElementById('divFormula').textContent=formula;
}
function updateAllLabs(){updateBuilderLab();updateGrowthLab();updateNegativeLab();updateProductLab();updateDivisionLab()}
function runSelfTests(){
  const required=['prevScene','nextScene','jumpScene','toggleTeacherPanel','toggleFullscreen','resetCurrentInteraction','checkAnswer','updateBuilderLab','updateDivisionLab'];
  const missing=required.filter(name=>typeof window[name]!=='function');
  console.assert(missing.length===0,'Missing global functions:',missing);
  console.assert(scenes.length>=25,'Expected at least 25 scenes');
  console.assert(pow(2,3)===8,'pow test failed');
  console.info('Lecture 16 Exponents self-test complete. Missing functions:',missing.length?missing:'none');
}
function init(){
  sceneSelect.innerHTML='';
  scenes.forEach((s,i)=>{const opt=document.createElement('option');opt.value=i;opt.textContent=(i+1)+'. '+s.name;sceneSelect.appendChild(opt)});
  renderScene(0);
  setTimeout(runSelfTests,0);
}
Object.assign(window,{nextScene,prevScene,jumpScene,toggleTeacherPanel,toggleFullscreen,resetCurrentInteraction,checkAnswer,updateBuilderLab,updateGrowthLab,updateNegativeLab,updateProductLab,updateDivisionLab});
document.addEventListener('keydown',e=>{
  if(e.key==='ArrowRight'||e.key===' '){e.preventDefault();nextScene()}
  if(e.key==='ArrowLeft'){e.preventDefault();prevScene()}
  if(e.key.toLowerCase()==='f'){e.preventDefault();toggleFullscreen()}
  if(e.key.toLowerCase()==='t'){e.preventDefault();toggleTeacherPanel()}
});
init();
})();
</script>
